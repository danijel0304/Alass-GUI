name: Build Linux DEB

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-deb:
    runs-on: ubuntu-latest

    steps:
      - name: Download code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Build Linux binary
        run: |
          chmod +x bin/alass || true
          pyinstaller --onefile --windowed --name alass-gui alass_gui.py

      - name: Create DEB structure
        run: |
          mkdir -p package/DEBIAN
          mkdir -p package/usr/bin
          mkdir -p package/usr/share/applications

          cp dist/alass-gui package/usr/bin/alass-gui
          chmod +x package/usr/bin/alass-gui

          cat > package/DEBIAN/control <<EOF
          Package: alass-gui
          Version: 1.0.0
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: Danijel
          Description: Graphical interface for alass subtitle synchronization tool
          EOF

          cat > package/usr/share/applications/alass-gui.desktop <<EOF
          [Desktop Entry]
          Name=Alass GUI
          Comment=Subtitle synchronization tool
          Exec=alass-gui
          Terminal=false
          Type=Application
          Categories=AudioVideo;Utility;
          EOF

      - name: Build DEB package
        run: |
          dpkg-deb --build package alass-gui_1.0.0_amd64.deb

      - name: Upload DEB
        uses: actions/upload-artifact@v4
        with:
          name: Alass-GUI-DEB
          path: alass-gui_1.0.0_amd64.deb
